<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="icon" href="data:," />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #080605;
      }

      .update-fallback {
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        box-sizing: border-box;
        padding: clamp(12px, 4vh, 36px) 20px;
        background-image: url('%PUBLIC_URL%/talentbackground/SRBackground.png');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: #d4bc8b;
        text-align: center;
        font-family: Georgia, 'Times New Roman', serif;
        user-select: none;
        -webkit-user-select: none;
      }

      .update-fallback__content {
        width: min(92vw, 720px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(18px, 3vh, 28px);
      }

      .update-fallback__logo {
        width: clamp(170px, 24vw, 330px);
        height: auto;
        user-select: none;
        -webkit-user-select: none;
        pointer-events: none;
      }

      .update-fallback__panel {
        position: relative;
        width: min(100%, 620px);
        box-sizing: border-box;
        padding: 18px 30px;
        background-image: url('%PUBLIC_URL%/talentbackground/select_dropdown_container sliced.png');
        background-size: calc(100% + 34px) calc(100% + 34px);
        background-position: center;
        background-repeat: no-repeat;
        box-shadow:
          inset 0 0 0 1px rgba(110, 90, 66, 0.55),
          inset 0 1px 0 rgba(180, 150, 112, 0.14),
          0 8px 14px rgba(0, 0, 0, 0.34);
      }

      .update-fallback__message,
      .update-fallback__countdown {
        margin: 0;
        font-variant-numeric: tabular-nums;
        line-height: 1.3;
        text-shadow:
          0 1px 0 rgba(255, 245, 220, 0.1),
          0 2px 3px rgba(0, 0, 0, 0.8);
      }

      .update-fallback__message {
        font-size: clamp(22px, 3.4vw, 32px);
      }

      .update-fallback__countdown {
        margin-top: 10px;
        font-size: clamp(18px, 2.4vw, 24px);
      }
    </style>
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Stolen Realm</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      (function () {
        var fallbackDelay = 8000;
        var root = document.getElementById('root');

        if (!root) {
          return;
        }

        function startRefreshCountdown() {
          var secondsRemaining = 20;
          var countdown = document.querySelector('[data-refresh-countdown]');

          if (!countdown) {
            return;
          }

          var intervalId = window.setInterval(function () {
            if (!countdown.isConnected) {
              window.clearInterval(intervalId);
              return;
            }

            secondsRemaining -= 1;
            countdown.textContent = String(secondsRemaining);

            if (secondsRemaining <= 0) {
              window.clearInterval(intervalId);
              window.location.reload();
            }
          }, 1000);
        }

        window.setTimeout(function () {
          if (document.documentElement.dataset.appMounted === 'true' || root.hasChildNodes()) {
            return;
          }

          root.innerHTML = [
            '<main class="update-fallback" aria-live="polite">',
            '<section class="update-fallback__content" aria-label="Site update status">',
            '<img class="update-fallback__logo" src="%PUBLIC_URL%/talentbackground/SRLogo.png" alt="Stolen Realm" />',
            '<div class="update-fallback__panel">',
            '<p class="update-fallback__message">The website is currently being updated and will be available momentarily.</p>',
            '<p class="update-fallback__countdown">Refreshing in <span data-refresh-countdown>20</span> seconds...</p>',
            '</div>',
            '</section>',
            '</main>'
          ].join('');

          startRefreshCountdown();
        }, fallbackDelay);
      })();
    </script>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
