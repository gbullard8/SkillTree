name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout production source
        uses: actions/checkout@v4
        with:
          ref: main
          path: prod-source

      - name: Checkout development source
        uses: actions/checkout@v4
        with:
          ref: develop
          path: dev-source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            prod-source/package-lock.json
            dev-source/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install production dependencies
        working-directory: prod-source
        run: npm ci

      - name: Build production site
        working-directory: prod-source
        run: PUBLIC_URL=/SkillTree npm run build

      - name: Install development dependencies
        working-directory: dev-source
        run: npm ci

      - name: Build development site
        working-directory: dev-source
        run: PUBLIC_URL=/SkillTree/dev npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir pages
          cp -R prod-source/build/. pages/
          mkdir -p pages/dev
          cp -R dev-source/build/. pages/dev/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
