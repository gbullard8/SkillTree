<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Stolen Realm Updating</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #080605;
      }

      .update-fallback {
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        box-sizing: border-box;
        padding: clamp(12px, 4vh, 36px) 20px;
        background-image: var(--fallback-bg-url, url('public/talentbackground/SRBackground.png'));
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: #d4bc8b;
        text-align: center;
        font-family: Georgia, 'Times New Roman', serif;
        user-select: none;
        -webkit-user-select: none;
      }

      .update-fallback__content {
        width: min(92vw, 720px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(18px, 3vh, 28px);
      }

      .update-fallback__logo {
        width: clamp(170px, 24vw, 330px);
        height: auto;
        user-select: none;
        -webkit-user-select: none;
        pointer-events: none;
      }

      .update-fallback__panel {
        position: relative;
        width: min(100%, 620px);
        box-sizing: border-box;
        padding: 18px 30px;
        background-image: var(--fallback-panel-url, url('public/talentbackground/select_dropdown_container sliced.png'));
        background-size: calc(100% + 34px) calc(100% + 34px);
        background-position: center;
        background-repeat: no-repeat;
        box-shadow:
          inset 0 0 0 1px rgba(110, 90, 66, 0.55),
          inset 0 1px 0 rgba(180, 150, 112, 0.14),
          0 8px 14px rgba(0, 0, 0, 0.34);
      }

      .update-fallback__message,
      .update-fallback__countdown {
        margin: 0;
        font-variant-numeric: tabular-nums;
        line-height: 1.3;
        text-shadow:
          0 1px 0 rgba(255, 245, 220, 0.1),
          0 2px 3px rgba(0, 0, 0, 0.8);
      }

      .update-fallback__message {
        font-size: clamp(22px, 3.4vw, 32px);
      }

      .update-fallback__countdown {
        margin-top: 10px;
        font-size: clamp(18px, 2.4vw, 24px);
      }
    </style>
  </head>
  <body>
    <main class="update-fallback" aria-live="polite">
      <section class="update-fallback__content" aria-label="Site update status">
        <img class="update-fallback__logo" data-fallback-logo alt="Stolen Realm" />
        <div class="update-fallback__panel">
          <p class="update-fallback__message">The website is currently being updated and will be available momentarily.</p>
          <p class="update-fallback__countdown">Refreshing in <span data-refresh-countdown>20</span> seconds...</p>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var assetRoots = [
          'talentbackground',
          'public/talentbackground',
          '/SkillTree/talentbackground'
        ];
        var root = document.documentElement;
        var logo = document.querySelector('[data-fallback-logo]');

        function firstWorkingImage(fileName, onLoad) {
          var index = 0;

          function tryNext() {
            if (index >= assetRoots.length) {
              return;
            }

            var src = assetRoots[index] + '/' + fileName;
            var probe = new Image();
            index += 1;
            probe.onload = function () {
              onLoad(src);
            };
            probe.onerror = tryNext;
            probe.src = src;
          }

          tryNext();
        }

        firstWorkingImage('SRBackground.png', function (src) {
          root.style.setProperty('--fallback-bg-url', 'url("' + src + '")');
        });

        firstWorkingImage('select_dropdown_container sliced.png', function (src) {
          root.style.setProperty('--fallback-panel-url', 'url("' + src + '")');
        });

        if (logo) {
          firstWorkingImage('SRLogo.png', function (src) {
            logo.src = src;
          });
        }

        var secondsRemaining = 20;
        var countdown = document.querySelector('[data-refresh-countdown]');

        if (!countdown) {
          return;
        }

        var intervalId = window.setInterval(function () {
          if (!countdown.isConnected) {
            window.clearInterval(intervalId);
            return;
          }

          secondsRemaining -= 1;
          countdown.textContent = String(secondsRemaining);

          if (secondsRemaining <= 0) {
            window.clearInterval(intervalId);
            window.location.reload();
          }
        }, 1000);
      })();
    </script>
  </body>
</html>
